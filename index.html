<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grocery Order — The Daveys</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
:root {
  --green: #1a5c38;
  --green-light: #e8f5ee;
  --green-mid: #2d7a4f;
  --green-dark: #0f3d24;
  --amber: #b45309;
  --amber-light: #fef3c7;
  --red: #991b1b;
  --red-light: #fee2e2;
  --blue: #1a56b0;
  --blue-light: #eff6ff;
  --gray-50: #f9fafb;
  --gray-100: #f3f4f6;
  --gray-200: #e5e7eb;
  --gray-300: #d1d5db;
  --gray-400: #9ca3af;
  --gray-500: #6b7280;
  --gray-600: #4b5563;
  --gray-700: #374151;
  --gray-800: #1f2937;
  --gray-900: #111827;
  --radius: 12px;
  --radius-sm: 8px;
  --radius-xs: 6px;
  --shadow: 0 1px 4px rgba(0,0,0,0.06);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'DM Sans', sans-serif;
  background: #f0f4f1;
  color: var(--gray-900);
  min-height: 100vh;
  padding-bottom: 120px;
}

.app-header {
  background: var(--green);
  color: white;
  padding: 20px 20px 0;
  position: sticky;
  top: 0;
  z-index: 200;
  box-shadow: 0 2px 16px rgba(0,0,0,0.18);
}
.header-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}
.header-title {
  font-family: 'DM Serif Display', serif;
  font-size: 22px;
  font-weight: 400;
  letter-spacing: -0.02em;
}
.header-date {
  font-size: 12px;
  opacity: 0.65;
  font-weight: 300;
  margin-top: 1px;
}
.header-badge {
  background: rgba(255,255,255,0.15);
  border: 1px solid rgba(255,255,255,0.25);
  border-radius: 20px;
  padding: 4px 12px;
  font-size: 12px;
  font-weight: 500;
}

.wrap { padding: 10px 10px 0; max-width: 540px; margin: 0 auto; }

.card {
  background: white;
  border-radius: var(--radius);
  margin-bottom: 8px;
  overflow: hidden;
  box-shadow: var(--shadow);
}

.card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  cursor: pointer;
  user-select: none;
  transition: background 0.1s;
}
.card-header:active { background: var(--gray-50); }
.card-header-left {
  display: flex;
  align-items: center;
  gap: 9px;
}
.card-emoji { font-size: 16px; flex-shrink: 0; }
.card-title {
  font-size: 14px;
  font-weight: 600;
  color: var(--gray-900);
}
.card-badge {
  font-size: 11px;
  font-weight: 600;
  background: var(--green-light);
  color: var(--green);
  border-radius: 20px;
  padding: 2px 8px;
  display: none;
  margin-top: 2px;
}
.card-badge.visible { display: inline-block; }
.card-chevron {
  color: var(--gray-400);
  font-size: 12px;
  transition: transform 0.2s;
  flex-shrink: 0;
  margin-left: 8px;
}
.card-chevron.open { transform: rotate(180deg); }
.card-divider { height: 1px; background: var(--gray-100); margin: 0 16px; }
.card-body { display: none; padding: 14px 16px; }
.card-body.open { display: block; }

.field { margin-bottom: 14px; }
.field:last-child { margin-bottom: 0; }
.input, .textarea {
  width: 100%;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  padding: 9px 12px;
  border: 1px solid var(--gray-200);
  border-radius: var(--radius-sm);
  background: var(--gray-50);
  color: var(--gray-900);
  outline: none;
  transition: border-color 0.15s, background 0.15s;
}
.input:focus, .textarea:focus {
  border-color: var(--green);
  background: white;
}
.input::placeholder, .textarea::placeholder { color: var(--gray-400); }
.textarea { resize: none; min-height: 72px; line-height: 1.5; }

/* Item rows */
.item-row {
  display: grid;
  grid-template-columns: 20px 1fr auto;
  align-items: center;
  gap: 9px;
  padding: 9px 0;
  border-bottom: 1px solid var(--gray-100);
}
.item-row:last-child { border-bottom: none; }
.item-row.checked { background: var(--green-light); border-radius: var(--radius-xs); padding: 9px 6px; }
.checkbox {
  width: 20px; height: 20px;
  border: 2px solid var(--gray-300);
  border-radius: 5px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: all 0.12s;
}
.checkbox.checked { background: var(--green); border-color: var(--green); }
.checkbox.checked::after {
  content: '';
  display: block;
  width: 10px; height: 6px;
  border-left: 2px solid white;
  border-bottom: 2px solid white;
  transform: rotate(-45deg) translateY(-1px);
}
.item-info { min-width: 0; }
.item-name {
  font-size: 13px;
  font-weight: 500;
  color: var(--gray-900);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.item-notes-small { font-size: 11px; color: var(--gray-400); margin-top: 1px; }

/* Qty stepper — − [num label] + */
.qty-stepper {
  display: flex;
  align-items: center;
  flex-shrink: 0;
  opacity: 0.35;
  pointer-events: none;
  transition: opacity 0.12s;
}
.qty-stepper.active {
  opacity: 1;
  pointer-events: all;
}
.qty-step-btn {
  width: 22px; height: 22px;
  border: 1px solid var(--gray-200);
  background: var(--gray-50);
  border-radius: 4px;
  font-size: 14px;
  line-height: 1;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: var(--gray-600);
  font-family: 'DM Sans', sans-serif;
  flex-shrink: 0;
  transition: background 0.1s;
}
.qty-step-btn:active { background: var(--gray-200); }
.qty-step-val {
  font-size: 11px;
  font-weight: 600;
  color: var(--gray-800);
  min-width: 32px;
  text-align: center;
  padding: 0 3px;
  white-space: nowrap;
}

/* Custom section */
.custom-section {
  border-top: 1px dashed var(--gray-200);
  padding: 10px 0 0;
  margin-top: 8px;
}
.custom-label {
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .07em;
  color: var(--gray-400);
  margin-bottom: 8px;
}
/* Custom item rows — 4 fields matching standard item format */
.custom-item-row {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 6px;
  margin-bottom: 8px;
}
.custom-item-row-fields {
  display: grid;
  grid-template-columns: 1fr 60px 80px;
  gap: 5px;
}
.custom-qty-wrap {
  display: flex;
  gap: 4px;
  align-items: center;
}
.custom-notes-row {
  margin: -2px 0 8px 0;
}
.custom-remove-btn {
  background: none;
  border: none;
  color: var(--gray-400);
  font-size: 16px;
  cursor: pointer;
  padding: 0 2px;
  line-height: 1;
  align-self: start;
  margin-top: 8px;
}
.add-btn {
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 5px 0;
  font-family: 'DM Sans', sans-serif;
  font-size: 12px;
  font-weight: 500;
  color: var(--green);
  background: none;
  border: none;
  cursor: pointer;
  margin-top: 4px;
}
.add-btn:hover { opacity: 0.7; }

.skip-bar {
  background: white;
  border-radius: var(--radius);
  margin-bottom: 8px;
  overflow: hidden;
  box-shadow: var(--shadow);
}
.skip-btn {
  width: 100%;
  padding: 13px 16px;
  background: white;
  border: none;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  font-weight: 500;
  color: var(--gray-500);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  gap: 7px;
}
.skip-btn:hover { background: var(--gray-50); }

.notes-bar {
  background: white;
  border-radius: var(--radius);
  margin-bottom: 8px;
  padding: 14px 16px;
  box-shadow: var(--shadow);
}
.notes-bar-label {
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .07em;
  color: var(--gray-400);
  margin-bottom: 7px;
}

.footer {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: white;
  border-top: 1px solid var(--gray-200);
  padding: 12px 16px;
  padding-bottom: calc(12px + env(safe-area-inset-bottom));
  box-shadow: 0 -4px 16px rgba(0,0,0,0.08);
  z-index: 100;
}
.footer-inner { max-width: 540px; margin: 0 auto; }
.submit-btn {
  width: 100%;
  padding: 14px;
  background: var(--green);
  color: white;
  border: none;
  border-radius: var(--radius);
  font-family: 'DM Sans', sans-serif;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
}
.submit-btn:active { transform: scale(0.98); }
.submit-btn:disabled { background: var(--gray-400); cursor: not-allowed; transform: none; }

.success-screen {
  display: none;
  flex-direction: column;
  align-items: center;
  padding: 60px 28px;
  text-align: center;
  gap: 14px;
}
.success-screen.visible { display: flex; }
.success-icon {
  width: 64px; height: 64px;
  border-radius: 50%;
  background: var(--green-light);
  display: flex; align-items: center; justify-content: center;
  font-size: 26px;
}
.success-screen h2 {
  font-family: 'DM Serif Display', serif;
  font-size: 24px;
  font-weight: 400;
}
.success-screen p { font-size: 14px; color: var(--gray-500); line-height: 1.6; max-width: 280px; }
.success-summary {
  background: var(--gray-50);
  border: 1px solid var(--gray-200);
  border-radius: var(--radius);
  padding: 14px;
  width: 100%;
  text-align: left;
  max-height: 260px;
  overflow-y: auto;
}
.success-row {
  display: flex;
  justify-content: space-between;
  font-size: 12px;
  padding: 3px 0;
  border-bottom: 1px solid var(--gray-100);
  color: var(--gray-700);
}
.success-row:last-child { border-bottom: none; }
.success-sec {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .07em;
  color: var(--gray-400);
  padding: 6px 0 2px;
}

.progress-bar-wrap { background: rgba(255,255,255,0.2); border-radius: 4px; height: 3px; overflow: hidden; }
.progress-bar-fill { background: white; height: 100%; border-radius: 4px; transition: width 0.3s; width: 0%; }

@media (min-width: 560px) {
  .wrap { padding-left: 0; padding-right: 0; }
  .footer { padding: 14px; }
}
</style>
</head>
<body>

<div class="app-header">
  <div class="header-top">
    <div>
      <div class="header-title">Grocery Order</div>
      <div class="header-date" id="header-date"></div>
    </div>
    <div class="header-badge" id="header-badge">0 items</div>
  </div>
  <div class="progress-bar-wrap">
    <div class="progress-bar-fill" id="progress-bar"></div>
  </div>
</div>

<div id="grocery-main">
  <div class="wrap">
    <div class="skip-bar">
      <button class="skip-btn" onclick="skipGroceries()">
        <span style="width:16px;height:16px;border-radius:50%;border:1.5px solid var(--gray-400);display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--gray-400);flex-shrink:0;">✕</span>
        No groceries today
      </button>
    </div>
    <div class="notes-bar">
      <div class="notes-bar-label">Notes for Leah</div>
      <textarea class="textarea" id="grocery-notes" placeholder="Any special instructions, reminders, or notes for this order..." style="min-height:56px;"></textarea>
    </div>
    <div id="grocery-sections"></div>
  </div>
</div>

<div class="success-screen" id="grocery-success">
  <div class="success-icon">✓</div>
  <h2>Order submitted!</h2>
  <p>You'll receive a confirmation email shortly. Leah's list will be ready for tomorrow.</p>
  <div class="success-summary" id="grocery-summary"></div>
</div>

<div class="footer" id="footer">
  <div class="footer-inner">
    <button class="submit-btn" id="grocery-submit-btn" onclick="submitGrocery()" disabled>Select items to submit</button>
  </div>
</div>

<script>
// ─── CONFIG ────────────────────────────────────────────────────────────────────
const params = new URLSearchParams(window.location.search);
const GROCERY_WEBHOOK = params.get('hook') || '';

// ─── STATE ────────────────────────────────────────────────────────────────────
let selections = {};
let customItems = {};

// ─── HELPERS ──────────────────────────────────────────────────────────────────
function today() {
  return new Date().toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric' });
}
function detectDay() {
  const dow = new Date().getDay();
  return (dow === 3 || dow === 4) ? 'Thursday' : 'Tuesday';
}
function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─── SECTIONS ────────────────────────────────────────────────────────────────
const SECTION_CONFIG = [
  { key:'Fruits',              emoji:'🍓', label:'Fruits' },
  { key:'Vegetables',          emoji:'🥦', label:'Vegetables' },
  { key:'Protein',             emoji:'🥩', label:'Protein' },
  { key:'Dairy',               emoji:'🥛', label:'Dairy' },
  { key:'Deli',                emoji:'🍖', label:'Deli' },
  { key:'Frozen',              emoji:'🧊', label:'Frozen' },
  { key:'Grains & Bread',      emoji:'🍞', label:'Grains & Bread' },
  { key:'Beverages',           emoji:'🥤', label:'Beverages' },
  { key:'Condiments & Pantry', emoji:'🫙', label:'Condiments & Pantry' },
  { key:'Snacks',              emoji:'🍿', label:'Snacks' },
  { key:'Household & Baby',    emoji:'🏠', label:'Household & Baby' },
];

const FREQ_ORDER = {'Every week':0,'Most weeks':1,'Occasional':2,'Rare':3};

// ─── BUILD ───────────────────────────────────────────────────────────────────
function buildGrocery() {
  const wrap = document.getElementById('grocery-sections');
  wrap.innerHTML = '';
  selections = {};
  customItems = {};
  SECTION_CONFIG.forEach(s => { customItems[s.key] = []; });

  // Only show Whole Foods items in the app (Jewel/CVS items are session-planner errands)
  const wfItems = GROCERY_ITEMS.filter(i => i.store === 'Whole Foods');

  const bySection = {};
  SECTION_CONFIG.forEach(s => { bySection[s.key] = []; });
  wfItems.forEach(item => {
    if (bySection[item.section]) bySection[item.section].push(item);
  });
  SECTION_CONFIG.forEach(sc => {
    bySection[sc.key].sort((a,b) => {
      const fo = (FREQ_ORDER[a.frequency]??99) - (FREQ_ORDER[b.frequency]??99);
      if (fo !== 0) return fo;
      return (a.sortOrder??99) - (b.sortOrder??99);
    });
  });

  wfItems.forEach(item => {
    // qty initialized to formatted display string so submitted value always matches what stepper shows
    selections[item.id] = {
      checked: false,
      qty: formatQty(parseQty(item.quantity)),
      name: item.name,
      section: item.section,
      notes: item.notes,
      store: item.store,
    };
  });

  SECTION_CONFIG.forEach((sc, idx) => {
    const items = bySection[sc.key];
    const sec = buildSection(sc, items, idx === 0);
    wrap.appendChild(sec);
  });
  updateTotals();
}

function buildSection(sc, items, isOpen) {
  const sec = document.createElement('div');
  sec.className = 'card';
  const safeKey = sc.key.replace(/\W/g,'-');

  const header = document.createElement('div');
  header.className = 'card-header';
  header.innerHTML = `
    <div class="card-header-left">
      <span class="card-emoji">${sc.emoji}</span>
      <div>
        <div class="card-title">${sc.label}</div>
        <span class="card-badge" id="gbadge-${safeKey}"></span>
      </div>
    </div>
    <span class="card-chevron ${isOpen?'open':''}" id="gchev-${safeKey}">▾</span>
  `;
  header.onclick = () => {
    const body = document.getElementById('gbody-'+safeKey);
    const chev = document.getElementById('gchev-'+safeKey);
    const open = body.classList.contains('open');
    body.classList.toggle('open', !open);
    chev.classList.toggle('open', !open);
  };
  sec.appendChild(header);

  const divider = document.createElement('div');
  divider.className = 'card-divider';
  sec.appendChild(divider);

  const body = document.createElement('div');
  body.className = `card-body ${isOpen?'open':''}`;
  body.id = 'gbody-'+safeKey;

  items.forEach(item => body.appendChild(buildItemRow(item)));

  // Custom add section
  const customWrap = document.createElement('div');
  customWrap.className = 'custom-section';
  customWrap.innerHTML = `
    <div class="custom-label">Anything else from ${sc.label}?</div>
    <div id="gcustom-rows-${safeKey}"></div>
    <button class="add-btn" onclick="addCustomRow('${sc.key}')">+ Add item</button>
  `;
  body.appendChild(customWrap);
  addCustomRow(sc.key, body.querySelector(`#gcustom-rows-${safeKey}`));

  sec.appendChild(body);
  return sec;
}

// Split "Blueberries (jumbo)" → base "Blueberries", paren "(jumbo)"
function splitItemName(name) {
  const m = name.match(/^(.*?)\s*(\([^)]+\))\s*$/);
  if (m) return { base: m[1], paren: m[2] };
  return { base: name, paren: '' };
}

// Three stepping modes:
//   lb/pound  → steps in 0.25 lb increments, displays as fractions ("1/2 lb", "1 1/4 lb")
//   n-pack    → integer steps, label preserved ("1 8-pack" → "2 8-pack")
//   int+label → integer steps, label preserved ("2 heads" → "3 heads")
//   fixed     → no buttons (anything unrecognised)
// LB_RE handles: "0.5 lb", "1 lb", "1/4 lb", "3/4 lb", "1 1/4 lb"
const LB_RE   = /^([\d]+(?:\/[\d]+)?|[\d]+\s+[\d]+\/[\d]+|[\d]*\.[\d]+)\s*(lb|lbs|pound|pounds)$/i;
const PACK_RE = /^(\d+)\s+(\d+[-–][\w]+)$/;   // "1 8-pack", "1 12-pack", "1 4-pack"
const INT_RE  = /^(\d+)(\s+(.+))?$/;

// Convert a fraction/mixed-number string to a decimal
function parseLbNum(s) {
  s = s.trim();
  // Mixed number: "1 1/4"
  const mixed = s.match(/^(\d+)\s+(\d+)\/(\d+)$/);
  if (mixed) return parseInt(mixed[1]) + parseInt(mixed[2]) / parseInt(mixed[3]);
  // Simple fraction: "1/4", "3/4"
  const frac = s.match(/^(\d+)\/(\d+)$/);
  if (frac) return parseInt(frac[1]) / parseInt(frac[2]);
  // Decimal or integer
  return parseFloat(s);
}

function parseQty(s) {
  if (!s) return { mode:'int', num:1, label:'' };
  s = s.trim();
  let m;
  if ((m = s.match(LB_RE)))   return { mode:'lb',   num: parseLbNum(m[1]) };
  if ((m = s.match(PACK_RE))) return { mode:'pack', num: parseInt(m[1]), pack: m[2] };
  if ((m = s.match(INT_RE)))  return { mode:'int',  num: parseInt(m[1]), label: m[3] || '' };
  return { mode:'fixed', label: s };
}

function formatQty(p) {
  if (p.mode === 'lb') {
    const fracs = { 0.25:'1/4', 0.5:'1/2', 0.75:'3/4' };
    const whole = Math.floor(p.num);
    const frac  = Math.round((p.num - whole) * 4) / 4;
    const fracStr = fracs[frac] || '';
    const numStr = whole > 0 && fracStr ? `${whole} ${fracStr}` : (fracStr || String(whole));
    return `${numStr} lb`;
  }
  if (p.mode === 'pack') return `${p.num} ${p.pack}`;
  if (p.mode === 'int')  return p.label ? `${p.num} ${p.label}` : String(p.num);
  return p.label;
}

function buildItemRow(item) {
  const row = document.createElement('div');
  row.className = 'item-row';
  row.id = 'grow-'+item.id;
  const { base, paren } = splitItemName(item.name);

  const nameHtml = escHtml(base)
    + (paren ? ` <span style="font-weight:400;color:var(--gray-400);font-size:11px;">${escHtml(paren)}</span>` : '');

  const parsed = parseQty(item.quantity);
  const canStep = parsed.mode !== 'fixed';
  const qtyLabel = escHtml(formatQty(parsed));

  row.innerHTML = `
    <div class="checkbox" id="gchk-${item.id}" onclick="toggleItem('${item.id}')"></div>
    <div class="item-info">
      <div class="item-name">${nameHtml}</div>
      ${item.notes ? `<div class="item-notes-small">${escHtml(item.notes)}</div>` : ''}
    </div>
    <div class="qty-stepper" id="gqty-${item.id}">
      ${canStep ? `<button class="qty-step-btn" onclick="stepQty('${item.id}',-1)">−</button>` : ''}
      <div class="qty-step-val" id="gqval-${item.id}">${qtyLabel}</div>
      ${canStep ? `<button class="qty-step-btn" onclick="stepQty('${item.id}',1)">+</button>` : ''}
    </div>
  `;
  return row;
}

function toggleItem(id) {
  const sel = selections[id];
  if (!sel) return;
  sel.checked = !sel.checked;
  document.getElementById('gchk-'+id)?.classList.toggle('checked', sel.checked);
  document.getElementById('grow-'+id)?.classList.toggle('checked', sel.checked);
  document.getElementById('gqty-'+id)?.classList.toggle('active', sel.checked);
  updateSectionBadge(sel.section);
  updateTotals();
}

function stepQty(id, delta) {
  const sel = selections[id];
  if (!sel || !sel.checked) return;
  const p = parseQty(sel.qty);
  if (p.mode === 'fixed') return;
  if (p.mode === 'lb') {
    p.num = Math.max(0.25, Math.round((p.num + delta * 0.25) * 4) / 4);
  } else {
    p.num = Math.max(1, p.num + delta);
  }
  sel.qty = formatQty(p);
  const valEl = document.getElementById('gqval-'+id);
  if (valEl) valEl.textContent = sel.qty;
}



function updateSectionBadge(sectionKey) {
  const safeKey = sectionKey.replace(/\W/g,'-');
  const badge = document.getElementById('gbadge-'+safeKey);
  if (!badge) return;
  const count = Object.values(selections).filter(s => s.checked && s.section === sectionKey).length;
  badge.textContent = count;
  badge.classList.toggle('visible', count > 0);
}

function addCustomRow(sectionKey, containerEl) {
  const safeKey = sectionKey.replace(/\W/g,'-');
  const container = containerEl || document.getElementById('gcustom-rows-'+safeKey);
  if (!container) return;
  const idx = container.children.length;
  const rowId = `cr-${safeKey}-${idx}`;

  if (!customItems[sectionKey]) customItems[sectionKey] = [];
  customItems[sectionKey][idx] = { name:'', qtyNum:'1', qtyLabel:'', notes:'' };

  const rowEl = document.createElement('div');
  rowEl.id = rowId;

  rowEl.innerHTML = `
    <div class="custom-item-row">
      <div style="flex:1;min-width:0;">
        <div class="custom-item-row-fields">
          <input class="input" type="text" placeholder="Item name (detail)"
                 style="font-size:13px;"
                 oninput="syncCustom('${sectionKey}',${idx},'name',this.value)" />
          <input class="input" type="text" placeholder="Qty" inputmode="decimal"
                 style="font-size:13px;text-align:center;"
                 value="1"
                 oninput="syncCustom('${sectionKey}',${idx},'qtyNum',this.value)" />
          <input class="input" type="text" placeholder="unit / lb"
                 style="font-size:13px;"
                 oninput="syncCustom('${sectionKey}',${idx},'qtyLabel',this.value)" />
        </div>
        <div class="custom-notes-row">
          <input class="input" type="text" placeholder="Notes (optional — appears below item)"
                 style="font-size:12px;margin-top:4px;"
                 oninput="syncCustom('${sectionKey}',${idx},'notes',this.value)" />
        </div>
      </div>
      <button class="custom-remove-btn" onclick="removeCustomRow('${sectionKey}',${idx},'${rowId}')" title="Remove">×</button>
    </div>
  `;
  container.appendChild(rowEl);
}

function removeCustomRow(sectionKey, idx, rowId) {
  const el = document.getElementById(rowId);
  if (el) el.remove();
  if (customItems[sectionKey] && customItems[sectionKey][idx]) {
    customItems[sectionKey][idx] = { name:'', qtyNum:'', qtyLabel:'', notes:'' };
  }
  updateTotals();
}

function syncCustom(sectionKey, idx, field, value) {
  if (!customItems[sectionKey]) customItems[sectionKey] = [];
  if (!customItems[sectionKey][idx]) customItems[sectionKey][idx] = {name:'',qtyNum:'1',qtyLabel:'',notes:''};
  customItems[sectionKey][idx][field] = value;
  updateTotals();
}

// Build a well-formed quantity string from qtyNum + qtyLabel
// Mirrors the formatQty logic for standard items:
//   "2" + "heads" → "2 heads"
//   "1/2" + "lb"  → "1/2 lb"  (lb triggers fraction parsing in the stepper display)
//   "1"   + ""    → "1"
function buildCustomQty(r) {
  const num   = (r.qtyNum || '1').trim();
  const label = (r.qtyLabel || '').trim();
  if (!label) return num;
  return `${num} ${label}`;
}

function updateTotals() {
  const checked = Object.values(selections).filter(s => s.checked).length;
  let customCount = 0;
  Object.values(customItems).forEach(rows => {
    rows.forEach(r => { if (r && r.name && r.name.trim()) customCount++; });
  });
  const total = checked + customCount;
  const totalPossible = Object.values(selections).length;

  document.getElementById('header-badge').textContent = total === 0 ? '0 items' : `${total} item${total !== 1 ? 's' : ''}`;
  document.getElementById('progress-bar').style.width = totalPossible > 0 ? `${Math.min(100, (checked / totalPossible) * 100)}%` : '0%';

  const btn = document.getElementById('grocery-submit-btn');
  btn.disabled = total === 0;
  btn.textContent = total === 0 ? 'Select items to submit' : `Submit ${total} item${total !== 1 ? 's' : ''}`;
}

// ─── SUBMIT ───────────────────────────────────────────────────────────────────
async function skipGroceries() {
  if (!confirm('Skip groceries this week? This will notify Leah that no Whole Foods run is needed.')) return;
  const payload = {
    submittedAt: new Date().toISOString(),
    dayOfWeek: detectDay(),
    skipped: true,
    selectedItems: [],
    customItems: [],
    totalItems: 0,
    orderNotes: ''
  };
  if (GROCERY_WEBHOOK) {
    fetch(GROCERY_WEBHOOK, { method:'POST', mode:'no-cors', headers:{'Content-Type':'text/plain'}, body: JSON.stringify(payload) }).catch(()=>{});
  }
  showSuccess([], []);
}

// Zapier flattens array fields into comma-separated strings.
// Notes can contain commas (e.g. "peeled, deveined") which would misalign the array.
// We sanitize by replacing commas with semicolons — consistent with existing note style.
function sanitizeForCSV(s) {
  return (s || '').replace(/,/g, ';');
}

function submitGrocery() {
  const btn = document.getElementById('grocery-submit-btn');
  btn.disabled = true;
  btn.textContent = 'Submitting...';

  const selected = Object.entries(selections)
    .filter(([, s]) => s.checked)
    .map(([id, s]) => ({
      notionPageId: id,
      name: s.name,
      section: s.section,
      store: s.store || 'Whole Foods',
      quantity: s.qty,
      notes: sanitizeForCSV(s.notes),
    }));

  const custom = [];
  Object.entries(customItems).forEach(([section, rows]) => {
    rows.forEach(r => {
      if (r && r.name && r.name.trim()) {
        custom.push({
          name: r.name.trim(),
          section,
          quantity: buildCustomQty(r),
          notes: sanitizeForCSV(r.notes),
          isNew: true,
          store: 'Whole Foods',
        });
      }
    });
  });

  const notes = document.getElementById('grocery-notes')?.value?.trim() || '';

  const payload = {
    submittedAt: new Date().toISOString(),
    dayOfWeek: detectDay(),
    selectedItems: selected,
    customItems: custom,
    totalItems: selected.length + custom.length,
    orderNotes: notes
  };

  if (GROCERY_WEBHOOK) {
    fetch(GROCERY_WEBHOOK, { method:'POST', mode:'no-cors', headers:{'Content-Type':'text/plain'}, body: JSON.stringify(payload) }).catch(()=>{});
  }
  showSuccess(selected, custom);
}

function showSuccess(selected, custom) {
  document.getElementById('grocery-main').style.display = 'none';
  document.getElementById('grocery-submit-btn').style.display = 'none';
  document.getElementById('grocery-success').classList.add('visible');

  const summary = document.getElementById('grocery-summary');
  summary.innerHTML = '';
  const allChosen = [
    ...selected.map(s => ({ name: s.name, qty: s.quantity, section: s.section })),
    ...custom.map(c => ({ name: c.name + ' ✦', qty: c.quantity, section: c.section }))
  ];
  const grouped = {};
  allChosen.forEach(item => {
    if (!grouped[item.section]) grouped[item.section] = [];
    grouped[item.section].push(item);
  });
  Object.entries(grouped).forEach(([section, items]) => {
    const sh = document.createElement('div');
    sh.className = 'success-sec';
    sh.textContent = section;
    summary.appendChild(sh);
    items.forEach(item => {
      const row = document.createElement('div');
      row.className = 'success-row';
      row.innerHTML = `<span>${escHtml(item.name)}</span><span style="color:var(--gray-400);font-size:11px;">${escHtml(item.qty)}</span>`;
      summary.appendChild(row);
    });
  });
}
