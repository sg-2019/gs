<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grocery Order</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #1a5c38;
    --green-light: #e8f5ee;
    --green-mid: #2d7a4f;
    --amber: #b45309;
    --amber-light: #fef3c7;
    --red: #991b1b;
    --red-light: #fee2e2;
    --gray-50: #f9fafb;
    --gray-100: #f3f4f6;
    --gray-200: #e5e7eb;
    --gray-400: #9ca3af;
    --gray-600: #4b5563;
    --gray-800: #1f2937;
    --gray-900: #111827;
    --radius: 12px;
    --radius-sm: 8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: #f0f4f1;
    color: var(--gray-900);
    min-height: 100vh;
    padding-bottom: 120px;
  }

  /* Header */
  .header {
    background: var(--green);
    color: white;
    padding: 28px 20px 24px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 12px rgba(0,0,0,0.15);
  }
  .header-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 14px;
  }
  .header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 26px;
    font-weight: 400;
    line-height: 1.1;
  }
  .header p {
    font-size: 13px;
    opacity: 0.75;
    margin-top: 3px;
    font-weight: 300;
  }
  .badge-total {
    background: rgba(255,255,255,0.18);
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 20px;
    padding: 5px 12px;
    font-size: 13px;
    font-weight: 500;
    white-space: nowrap;
    flex-shrink: 0;
    margin-left: 12px;
  }
  .progress-bar-wrap {
    background: rgba(255,255,255,0.2);
    border-radius: 4px;
    height: 4px;
    overflow: hidden;
  }
  .progress-bar-fill {
    background: white;
    height: 100%;
    border-radius: 4px;
    transition: width 0.3s ease;
    width: 0%;
  }

  /* Loading / Error */
  .state-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 80px 24px;
    text-align: center;
    gap: 16px;
  }
  .spinner {
    width: 36px; height: 36px;
    border: 3px solid var(--gray-200);
    border-top-color: var(--green);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .state-screen p { color: var(--gray-600); font-size: 15px; }
  .retry-btn {
    margin-top: 8px;
    padding: 10px 20px;
    background: var(--green);
    color: white;
    border: none;
    border-radius: var(--radius-sm);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
  }

  /* Sections */
  .sections-wrap { padding: 12px 12px 0; }

  .section {
    background: white;
    border-radius: var(--radius);
    margin-bottom: 10px;
    overflow: hidden;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }

  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px;
    cursor: pointer;
    user-select: none;
    background: white;
    transition: background 0.12s;
  }
  .section-header:active { background: var(--gray-50); }

  .section-title-wrap {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .section-emoji {
    font-size: 18px;
    line-height: 1;
  }
  .section-name {
    font-size: 15px;
    font-weight: 600;
    color: var(--gray-900);
  }
  .section-badge {
    font-size: 11px;
    font-weight: 600;
    background: var(--green-light);
    color: var(--green);
    border-radius: 20px;
    padding: 2px 8px;
    display: none;
  }
  .section-badge.visible { display: inline-block; }
  .section-chevron {
    color: var(--gray-400);
    font-size: 13px;
    transition: transform 0.2s;
    flex-shrink: 0;
  }
  .section-chevron.open { transform: rotate(180deg); }

  .section-divider {
    height: 1px;
    background: var(--gray-100);
    margin: 0 16px;
  }

  .section-body { display: none; }
  .section-body.open { display: block; }

  /* Item rows */
  .item-row {
    display: grid;
    grid-template-columns: 22px 1fr auto auto;
    align-items: center;
    gap: 10px;
    padding: 11px 16px;
    border-bottom: 1px solid var(--gray-100);
    transition: background 0.1s;
  }
  .item-row:last-of-type { border-bottom: none; }
  .item-row.checked { background: var(--green-light); }

  .checkbox {
    width: 22px; height: 22px;
    border: 2px solid var(--gray-300, #d1d5db);
    border-radius: 6px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: all 0.12s;
    background: white;
  }
  .checkbox.checked {
    background: var(--green);
    border-color: var(--green);
  }
  .checkbox.checked::after {
    content: '';
    display: block;
    width: 11px; height: 7px;
    border-left: 2.5px solid white;
    border-bottom: 2.5px solid white;
    transform: rotate(-45deg) translateY(-1px);
  }

  .item-info { min-width: 0; }
  .item-name {
    font-size: 14px;
    font-weight: 500;
    color: var(--gray-900);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .item-notes {
    font-size: 11px;
    color: var(--gray-400);
    margin-top: 1px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .item-last {
    font-size: 11px;
    font-weight: 500;
    white-space: nowrap;
    flex-shrink: 0;
    color: var(--gray-400);
  }
  .item-last.recent { color: #166534; }
  .item-last.stale { color: var(--red); }

  /* Quantity controls */
  .qty-controls {
    display: flex;
    align-items: center;
    gap: 0;
    opacity: 0.3;
    pointer-events: none;
    transition: opacity 0.15s;
    flex-shrink: 0;
  }
  .qty-controls.active {
    opacity: 1;
    pointer-events: all;
  }
  .qty-btn {
    width: 26px; height: 26px;
    border: 1px solid var(--gray-200);
    background: var(--gray-50);
    font-size: 15px;
    font-weight: 400;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: var(--gray-600);
    transition: background 0.1s;
    line-height: 1;
    font-family: 'DM Sans', sans-serif;
  }
  .qty-btn:first-child { border-radius: 6px 0 0 6px; }
  .qty-btn:last-child { border-radius: 0 6px 6px 0; }
  .qty-btn:active { background: var(--gray-200); }
  .qty-val {
    min-width: 32px;
    text-align: center;
    font-size: 13px;
    font-weight: 600;
    border-top: 1px solid var(--gray-200);
    border-bottom: 1px solid var(--gray-200);
    height: 26px;
    display: flex; align-items: center; justify-content: center;
    background: white;
    color: var(--gray-800);
  }

  /* Frequency dot */
  .freq-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
    display: none;
  }

  /* Custom item section */
  .custom-section {
    border-top: 1px dashed var(--gray-200);
    padding: 12px 16px;
    background: var(--gray-50);
  }
  .custom-section-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--gray-400);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 10px;
  }
  .custom-item-row {
    display: grid;
    grid-template-columns: 1fr 80px 1fr;
    gap: 6px;
    margin-bottom: 6px;
    align-items: center;
  }
  .custom-item-row:last-child { margin-bottom: 0; }

  .custom-input {
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    padding: 8px 10px;
    border: 1px solid var(--gray-200);
    border-radius: var(--radius-sm);
    background: white;
    color: var(--gray-900);
    outline: none;
    width: 100%;
    transition: border-color 0.15s;
  }
  .custom-input:focus { border-color: var(--green); }
  .custom-input::placeholder { color: var(--gray-400); }

  .add-custom-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 7px 0;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    color: var(--green);
    background: none;
    border: none;
    cursor: pointer;
    margin-top: 6px;
  }
  .add-custom-btn:hover { opacity: 0.75; }

  /* Footer / submit */
  .footer {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: white;
    border-top: 1px solid var(--gray-200);
    padding: 12px 16px;
    padding-bottom: calc(12px + env(safe-area-inset-bottom));
    box-shadow: 0 -4px 16px rgba(0,0,0,0.08);
    z-index: 100;
  }
  .submit-btn {
    width: 100%;
    padding: 15px;
    background: var(--green);
    color: white;
    border: none;
    border-radius: var(--radius);
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.01em;
  }
  .submit-btn:active { transform: scale(0.98); opacity: 0.9; }
  .submit-btn:disabled { background: var(--gray-400); cursor: not-allowed; transform: none; }

  /* Success screen */
  .success-screen {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 80px 32px;
    text-align: center;
    gap: 16px;
  }
  .success-screen.visible { display: flex; }
  .success-icon {
    width: 72px; height: 72px;
    background: var(--green-light);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 32px;
  }
  .success-screen h2 {
    font-family: 'DM Serif Display', serif;
    font-size: 26px;
    font-weight: 400;
    color: var(--green);
  }
  .success-screen p { font-size: 15px; color: var(--gray-600); line-height: 1.6; }
  .success-summary {
    background: var(--gray-50);
    border: 1px solid var(--gray-200);
    border-radius: var(--radius);
    padding: 16px;
    width: 100%;
    text-align: left;
    max-height: 300px;
    overflow-y: auto;
  }
  .success-summary-item {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    padding: 4px 0;
    border-bottom: 1px solid var(--gray-100);
    color: var(--gray-800);
  }
  .success-summary-item:last-child { border-bottom: none; }
  .success-summary-qty { color: var(--gray-500); font-size: 12px; }

  /* Section icons mapping */
  .freq-every { color: var(--green); }
  .freq-most { color: var(--amber); }
  .freq-occasional { color: var(--gray-400); }
  .freq-rare { color: var(--gray-300, #d1d5db); }

  .skip-bar {
  margin: 10px 12px 0;
  background: white;
  border-radius: var(--radius);
  border: 1.5px solid var(--gray-200);
  overflow: hidden;
  box-shadow: 0 1px 4px rgba(0,0,0,0.06);
}
.skip-btn {
  width: 100%;
  padding: 14px 16px;
  background: white;
  border: none;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  font-weight: 500;
  color: var(--gray-600);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  transition: background 0.12s;
}
.skip-btn:hover { background: var(--gray-50); }
.skip-btn:active { background: var(--gray-100); }
.skip-icon {
  width: 18px; height: 18px;
  border-radius: 50%;
  border: 1.5px solid var(--gray-400);
  display: flex; align-items: center; justify-content: center;
  font-size: 11px;
  color: var(--gray-400);
  flex-shrink: 0;
}

.notes-bar {
  margin: 10px 12px 0;
  background: white;
  border-radius: var(--radius);
  border: 0.5px solid var(--gray-200);
  box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  padding: 14px 16px;
}
.notes-bar-label {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .06em;
  color: var(--gray-400);
  margin-bottom: 8px;
}
.notes-textarea {
  width: 100%;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  padding: 10px 12px;
  border: 0.5px solid var(--gray-200);
  border-radius: var(--radius-sm);
  background: var(--gray-50);
  color: var(--gray-900);
  outline: none;
  resize: none;
  min-height: 72px;
  line-height: 1.5;
  transition: border-color 0.15s;
}
.notes-textarea:focus { border-color: var(--green); background: white; }
.notes-textarea::placeholder { color: var(--gray-400); }

@media (min-width: 480px) {
    .sections-wrap { max-width: 520px; margin: 0 auto; }
    .footer { padding: 14px; }
    .footer > * { max-width: 520px; margin: 0 auto; display: block; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div>
      <h1>Grocery Order</h1>
      <p id="header-date">Loading...</p>
    </div>
    <div class="badge-total" id="badge-total">0 items</div>
  </div>
  <div class="progress-bar-wrap">
    <div class="progress-bar-fill" id="progress-bar"></div>
  </div>
</div>



<div id="main-content" style="display:none;">
  <div class="skip-bar">
    <button class="skip-btn" onclick="skipGroceries()">
      <span class="skip-icon">✕</span>
      No groceries today
    </button>
  </div>
  <div class="notes-bar">
    <div class="notes-bar-label">Notes for Leah</div>
    <textarea class="notes-textarea" id="order-notes" placeholder="Any special instructions, reminders, or notes for this order..."></textarea>
  </div>
  <div class="sections-wrap" id="sections-wrap"></div>
</div>

<div id="success-screen" class="success-screen">
  <div class="success-icon">✓</div>
  <h2>Order submitted!</h2>
  <p>You'll receive a confirmation email shortly.<br>Leah's list will be ready for tomorrow.</p>
  <div class="success-summary" id="success-summary"></div>
</div>

<div class="footer" id="footer">
  <button class="submit-btn" id="submit-btn" onclick="submitOrder()" disabled>
    Select items to submit
  </button>
</div>

<script src="config.js"></script>
<script>
// Webhook URL read from URL parameter ?hook=... so it never touches GitHub
const params = new URLSearchParams(window.location.search);
const SUBMIT_WEBHOOK = params.get('hook') || window.GROCERY_CONFIG?.submitWebhook || '';

const SECTION_CONFIG = [
  { key: 'Fruits',              emoji: '🍓', label: 'Fruits' },
  { key: 'Vegetables',          emoji: '🥦', label: 'Vegetables' },
  { key: 'Protein',             emoji: '🥩', label: 'Protein' },
  { key: 'Dairy',               emoji: '🥛', label: 'Dairy' },
  { key: 'Deli',                emoji: '🍖', label: 'Deli' },
  { key: 'Frozen',              emoji: '🧊', label: 'Frozen' },
  { key: 'Grains & Bread',      emoji: '🍞', label: 'Grains & Bread' },
  { key: 'Beverages',           emoji: '🥤', label: 'Beverages' },
  { key: 'Condiments & Pantry', emoji: '🫙', label: 'Condiments & Pantry' },
  { key: 'Snacks',              emoji: '🍿', label: 'Snacks' },
  { key: 'Household & Baby',    emoji: '🏠', label: 'Household & Baby' },
];

const FREQ_ORDER = { 'Every week': 0, 'Most weeks': 1, 'Occasional': 2, 'Rare': 3 };

let allItems = [];        // raw from Notion/webhook
let selections = {};      // pageId -> { checked, qty, defaultQty, name }
let customItems = {};     // sectionKey -> [{name, qty, notes}]

// ── Helpers ──────────────────────────────────────────────────────────────────

function today() {
  return new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
}

function daysSince(dateStr) {
  if (!dateStr) return null;
  const d = new Date(dateStr);
  if (isNaN(d)) return null;
  return Math.floor((Date.now() - d.getTime()) / 86400000);
}

function lastBoughtLabel(dateStr) {
  const d = daysSince(dateStr);
  if (d === null) return { text: '', cls: '' };
  if (d === 0) return { text: 'Today', cls: 'recent' };
  if (d === 1) return { text: 'Yesterday', cls: 'recent' };
  if (d <= 7) return { text: `${d}d ago`, cls: 'recent' };
  if (d <= 14) return { text: `${d}d ago`, cls: '' };
  return { text: `${d}d ago`, cls: 'stale' };
}

function updateTotals() {
  const checked = Object.values(selections).filter(s => s.checked).length;
  const total = allItems.filter(i => i.store !== 'Jewel').length;
  // Count non-empty custom items across all sections
  let customCount = 0;
  Object.values(customItems).forEach(rows => {
    rows.forEach(r => { if (r && r.name && r.name.trim()) customCount++; });
  });
  const totalSelected = checked + customCount;
  document.getElementById('badge-total').textContent =
    totalSelected === 0 ? '0 items' : `${totalSelected} item${totalSelected !== 1 ? 's' : ''}`;
  document.getElementById('progress-bar').style.width =
    total > 0 ? `${Math.min(100, (checked / total) * 100)}%` : '0%';
  const btn = document.getElementById('submit-btn');
  btn.disabled = totalSelected === 0;
  btn.textContent = totalSelected === 0 ? 'Select items to submit' :
    `Submit ${totalSelected} item${totalSelected !== 1 ? 's' : ''}`;
}

// ── Data loading ──────────────────────────────────────────────────────────────

function loadItems() {
  allItems = FALLBACK_ITEMS;
  buildUI();
}

// ── UI building ───────────────────────────────────────────────────────────────

function buildUI() {
  document.getElementById('header-date').textContent = today();
  document.getElementById('main-content').style.display = 'block';

  const wrap = document.getElementById('sections-wrap');
  wrap.innerHTML = '';

  // Init selections
  selections = {};
  allItems.forEach(item => {
    selections[item.id] = {
      checked: false,
      qty: item.quantity || '1',
      defaultQty: item.quantity || '1',
      name: item.name,
      section: item.section,
      qtyType: item.qtyType || 'count',
      clarifier: item.clarifier || '',
      lastPurchased: item.lastPurchased || null,
    };
  });

  // Init custom items
  customItems = {};
  SECTION_CONFIG.forEach(s => { customItems[s.key] = []; });

  // Group by section
  const bySection = {};
  SECTION_CONFIG.forEach(s => { bySection[s.key] = []; });
  allItems.forEach(item => {
    if (bySection[item.section]) bySection[item.section].push(item);
    else if (bySection['Condiments & Pantry']) bySection['Condiments & Pantry'].push(item);
  });

  // Sort within each section by frequency
  SECTION_CONFIG.forEach(sc => {
    bySection[sc.key].sort((a, b) =>
      (FREQ_ORDER[a.frequency] ?? 99) - (FREQ_ORDER[b.frequency] ?? 99)
    );
  });

  // Render sections
  SECTION_CONFIG.forEach((sc, idx) => {
    const items = bySection[sc.key];
    const el = buildSection(sc, items, idx === 0);
    wrap.appendChild(el);
  });

  updateTotals();
}

function buildSection(sc, items, isOpen) {
  const sec = document.createElement('div');
  sec.className = 'section';
  sec.id = `section-${sc.key.replace(/\W/g, '-')}`;

  // Header
  const header = document.createElement('div');
  header.className = 'section-header';
  header.innerHTML = `
    <div class="section-title-wrap">
      <span class="section-emoji">${sc.emoji}</span>
      <span class="section-name">${sc.label}</span>
      <span class="section-badge" id="badge-${sc.key.replace(/\W/g, '-')}"></span>
    </div>
    <span class="section-chevron ${isOpen ? 'open' : ''}" id="chev-${sc.key.replace(/\W/g, '-')}">▾</span>
  `;
  header.onclick = () => toggleSection(sc.key);
  sec.appendChild(header);

  // Divider + body
  const divider = document.createElement('div');
  divider.className = 'section-divider';
  sec.appendChild(divider);

  const body = document.createElement('div');
  body.className = `section-body ${isOpen ? 'open' : ''}`;
  body.id = `body-${sc.key.replace(/\W/g, '-')}`;

  // Item rows
  items.forEach(item => {
    const row = buildItemRow(item);
    body.appendChild(row);
  });

  // Custom items area
  const customWrap = document.createElement('div');
  customWrap.className = 'custom-section';
  customWrap.id = `custom-${sc.key.replace(/\W/g, '-')}`;
  customWrap.innerHTML = `
    <div class="custom-section-label">Anything else from ${sc.label}?</div>
    <div class="custom-rows" id="custom-rows-${sc.key.replace(/\W/g, '-')}"></div>
    <button class="add-custom-btn" onclick="addCustomRow('${sc.key}')">
      + Add item
    </button>
  `;
  body.appendChild(customWrap);

  // Add first custom row by default
  addCustomRow(sc.key, customWrap.querySelector('.custom-rows'));

  sec.appendChild(body);
  return sec;
}

function buildItemRow(item) {
  const row = document.createElement('div');
  row.className = 'item-row';
  row.id = `row-${item.id}`;

  const lb = lastBoughtLabel(item.lastPurchased);
  const qtyType = item.qtyType || 'count';
  const qtyDisplay = qtyType === 'lb' ? (item.quantity || '1') + ' lb' : (item.quantity || '1');
  const clarifier = item.clarifier ? ` <span style="font-weight:400;color:var(--gray-400)">(${escHtml(item.clarifier)})</span>` : '';

  row.innerHTML = `
    <div class="checkbox" id="chk-${item.id}" onclick="toggleItem('${item.id}')"></div>
    <div class="item-info">
      <div class="item-name">${escHtml(item.name)}${clarifier}</div>
      ${item.notes ? `<div class="item-notes">${escHtml(item.notes)}</div>` : ''}
    </div>
    <div class="qty-controls" id="qty-${item.id}">
      <button class="qty-btn" onclick="adjQty('${item.id}',-1)">−</button>
      <div class="qty-val" id="qval-${item.id}">${qtyDisplay}</div>
      <button class="qty-btn" onclick="adjQty('${item.id}',1)">+</button>
    </div>
    <div class="item-last ${lb.cls}" id="last-${item.id}">${lb.text}</div>
  `;
  return row;
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Interactions ──────────────────────────────────────────────────────────────

function toggleSection(key) {
  const safeKey = key.replace(/\W/g, '-');
  const body = document.getElementById(`body-${safeKey}`);
  const chev = document.getElementById(`chev-${safeKey}`);
  const isOpen = body.classList.contains('open');
  body.classList.toggle('open', !isOpen);
  chev.classList.toggle('open', !isOpen);
}

function toggleItem(id) {
  const sel = selections[id];
  if (!sel) return;
  sel.checked = !sel.checked;

  const chk = document.getElementById(`chk-${id}`);
  const row = document.getElementById(`row-${id}`);
  const qty = document.getElementById(`qty-${id}`);

  chk.classList.toggle('checked', sel.checked);
  row.classList.toggle('checked', sel.checked);
  qty.classList.toggle('active', sel.checked);

  updateSectionBadge(sel.section);
  updateTotals();
}

function adjQty(id, delta) {
  const sel = selections[id];
  if (!sel || !sel.checked) return;

  // Bread toggle: cycle between 1 and 1/2
  if (sel.qtyType === 'bread') {
    sel.qty = sel.qty === '1' ? '1/2' : '1';
    document.getElementById(`qval-${id}`).textContent = sel.qty;
    return;
  }

  // Pound items: 0.25 lb increments, min 0.25
  if (sel.qtyType === 'lb') {
    const num = parseFloat(sel.qty) || 0.25;
    const next = Math.max(0.25, Math.round((num + delta * 0.25) * 4) / 4);
    const fracs = { 0.25: '1/4', 0.5: '1/2', 0.75: '3/4' };
    const whole = Math.floor(next);
    const frac = Math.round((next - whole) * 4) / 4;
    const fracStr = fracs[frac] || '';
    sel.qty = whole > 0 && fracStr ? `${whole} ${fracStr}` : (fracStr || String(whole));
    document.getElementById(`qval-${id}`).textContent = sel.qty + ' lb';
    return;
  }

  // Default: whole number increments, min 1
  const num = parseFloat(sel.qty) || 1;
  sel.qty = String(Math.max(1, num + delta));
  document.getElementById(`qval-${id}`).textContent = sel.qty;
}

function updateSectionBadge(sectionKey) {
  const safeKey = sectionKey.replace(/\W/g, '-');
  const badge = document.getElementById(`badge-${safeKey}`);
  if (!badge) return;
  const count = Object.values(selections).filter(s => s.checked && s.section === sectionKey).length;
  badge.textContent = count;
  badge.classList.toggle('visible', count > 0);
}

// ── Custom items ──────────────────────────────────────────────────────────────

function addCustomRow(sectionKey, containerEl) {
  const safeKey = sectionKey.replace(/\W/g, '-');
  const container = containerEl || document.getElementById(`custom-rows-${safeKey}`);
  if (!container) return;

  const idx = container.children.length;
  const rowEl = document.createElement('div');
  rowEl.className = 'custom-item-row';
  rowEl.innerHTML = `
    <input class="custom-input" type="text" placeholder="Item name"
      oninput="syncCustom('${sectionKey}', ${idx}, 'name', this.value)" />
    <input class="custom-input" type="text" placeholder="Qty"
      oninput="syncCustom('${sectionKey}', ${idx}, 'qty', this.value)" />
    <input class="custom-input" type="text" placeholder="Notes (optional)"
      oninput="syncCustom('${sectionKey}', ${idx}, 'notes', this.value)" />
  `;
  container.appendChild(rowEl);

  // Ensure slot exists
  if (!customItems[sectionKey]) customItems[sectionKey] = [];
  customItems[sectionKey][idx] = { name: '', qty: '', notes: '' };
}

function syncCustom(sectionKey, idx, field, value) {
  if (!customItems[sectionKey]) customItems[sectionKey] = [];
  if (!customItems[sectionKey][idx]) customItems[sectionKey][idx] = { name:'', qty:'', notes:'' };
  customItems[sectionKey][idx][field] = value;
  updateTotals();
}

// ── Submit ────────────────────────────────────────────────────────────────────

function skipGroceries() {
  if (!confirm('Skip groceries this week? This will notify Leah that no Whole Foods run is needed.')) return;

  const payload = {
    submittedAt: new Date().toISOString(),
    sessionDate: today(),
    skipped: true,
    selectedItems: [],
    customItems: [],
    totalItems: 0,
    orderNotes: ''
  };

  fetch(SUBMIT_WEBHOOK, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify(payload)
  }).catch(() => {});

  // Show skip success screen
  document.getElementById('main-content').style.display = 'none';
  document.getElementById('footer').style.display = 'none';
  const screen = document.getElementById('success-screen');
  screen.classList.add('visible');
  screen.querySelector('h2').textContent = 'No groceries today';
  screen.querySelector('p').textContent = 'Got it — no Whole Foods run this week. Leah has been notified.';
  screen.querySelector('.success-icon').textContent = '✕';
  document.getElementById('success-summary').style.display = 'none';
}

async function submitOrder() {
  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.textContent = 'Submitting...';

  // Build payload
  const selected = Object.entries(selections)
    .filter(([,s]) => s.checked)
    .map(([id, s]) => ({
      notionPageId: id,
      name: s.name,
      section: s.section,
      quantity: s.qty,
      lastPurchased: new Date().toISOString().slice(0,10)
    }));

  // Gather non-empty custom items
  const custom = [];
  Object.entries(customItems).forEach(([section, rows]) => {
    rows.forEach(r => {
      if (r.name && r.name.trim()) {
        custom.push({
          name: r.name.trim(),
          section,
          quantity: r.qty || '1',
          notes: r.notes || '',
          isNew: true
        });
      }
    });
  });

  const today_date = new Date().toISOString().slice(0,10);

  // Send one request per selected item so Zapier can update each Notion page
  // individually without needing a loop step
  const allRequests = selected.map(item =>
    fetch(SUBMIT_WEBHOOK, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({
        type: 'selected',
        sessionDate: today(),
        notionPageId: item.notionPageId,
        name: item.name,
        section: item.section,
        quantity: item.quantity,
        lastPurchased: today_date,
        skipped: false
      })
    }).catch(() => {})
  );

  // Also send one request per custom item
  const customRequests = custom.map(item =>
    fetch(SUBMIT_WEBHOOK, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({
        type: 'custom',
        sessionDate: today(),
        name: item.name,
        section: item.section,
        quantity: item.quantity,
        notes: item.notes,
        lastPurchased: today_date,
        skipped: false
      })
    }).catch(() => {})
  );

  // Send a final summary request
  const summaryRequest = fetch(SUBMIT_WEBHOOK, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify({
      type: 'summary',
      sessionDate: today(),
      totalItems: selected.length + custom.length,
      customItemCount: custom.length,
      skipped: false,
      itemNames: selected.map(i => i.name).join(', '),
      customItemNames: custom.map(i => i.name).join(', ')
    })
  }).catch(() => {});

  try {
    await Promise.all([...allRequests, ...customRequests, summaryRequest]);
  } catch(e) {
    // Still show success
  }

  showSuccess(selected, custom);
}

function showSuccess(selected, custom) {
  document.getElementById('main-content').style.display = 'none';
  document.getElementById('footer').style.display = 'none';

  const screen = document.getElementById('success-screen');
  screen.classList.add('visible');

  const summary = document.getElementById('success-summary');
  summary.innerHTML = '';

  const allChosen = [
    ...selected.map(s => ({ name: s.name, qty: s.quantity, section: s.section })),
    ...custom.map(c => ({ name: c.name + ' ✦', qty: c.quantity, section: c.section }))
  ];

  // Group by section for display
  const grouped = {};
  allChosen.forEach(item => {
    if (!grouped[item.section]) grouped[item.section] = [];
    grouped[item.section].push(item);
  });

  Object.entries(grouped).forEach(([section, items]) => {
    const header = document.createElement('div');
    header.style.cssText = 'font-size:11px;font-weight:600;color:#6b7280;text-transform:uppercase;letter-spacing:.06em;padding:6px 0 3px;';
    header.textContent = section;
    summary.appendChild(header);
    items.forEach(item => {
      const row = document.createElement('div');
      row.className = 'success-summary-item';
      row.innerHTML = `<span>${escHtml(item.name)}</span><span class="success-summary-qty">${escHtml(item.qty)}</span>`;
      summary.appendChild(row);
    });
  });
}
